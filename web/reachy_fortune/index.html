<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reachy Fortune Sketch</title>
    <link rel="stylesheet" href="/static/style.css?v=7" />
  </head>
  <body>
    <main>
      <section class="left">
        <h1>Reachy Fortune Sketch</h1>
        <div class="controls">
          <button id="connect">Connect voice</button>
          <button id="sendTest" disabled>Send test</button>
          <button id="manualTool">Manual tool call</button>
          <button id="mutemic" disabled>Mute mic</button>
          <button id="disconnect" disabled>Disconnect</button>
        </div>
        <div class="output-panel">
          <label class="device-picker">
            <span>Speaker target</span>
            <select id="speakerTarget">
              <option value="computer" selected>Computer</option>
              <option value="reachy">Reachy Mini</option>
            </select>
          </label>
          <label class="device-picker">
            <span>Audio output</span>
            <select id="audioOutput">
              <option value="">System default</option>
            </select>
          </label>
        </div>
        <p id="status">Idle</p>
        <audio id="remoteAudio" autoplay playsinline controls></audio>
        <div id="transcript" aria-live="polite"></div>
        <details class="debug-panel">
          <summary>Debug log</summary>
          <pre id="log"></pre>
        </details>
      </section>
      <section class="right">
        <canvas id="fortuneCanvas" width="900" height="900"></canvas>
        <p id="interpretation"></p>
        <section class="manual-panel">
          <h2>Manual tool call</h2>
          <pre id="manualToolOutput">No manual tool call yet.</pre>
        </section>
      </section>
    </main>
    <script src="/static/main.js?v=9"></script>
  </body>
</html>
